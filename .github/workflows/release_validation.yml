name: Release Validation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  release-validate:
    name: Verification & Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verify Snapshot Restoration & Replay Determinism (Tests)
      run: |
        pytest tests/test_resilience.py tests/test_rollback.py tests/test_governance.py tests/test_audit.py -v

    - name: Execute End-to-End Governance & Resilience Simulator
      run: |
        python main.py
