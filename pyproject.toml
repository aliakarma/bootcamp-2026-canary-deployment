[tool.black]
line-length = 100
target-version = ['py310', 'py311', 'py312']
force-exclude = 'venv/'

[tool.ruff]
line-length = 100
target-version = "py310"
exclude = [".git", "__pycache__", "venv", ".venv"]

[tool.ruff.lint]
# Enable pycodestyle (E), Pyflakes (F), pep8-naming (N), isort (I), mccabe (C90)
select = ["E", "F", "W", "C90", "I", "N"]
ignore = ["E501", "C901"]

[tool.ruff.lint.mccabe]
max-complexity = 15
